# Lumen — secret config schema.
# This file is COMMITTED to the repo with EMPTY/PLACEHOLDER values only.
# Real secret values go in secrets.local.yaml (gitignored).
# Loader merges secrets.local.yaml on top of this file.
#
# In production, prefer environment variables or AWS Secrets Manager over
# secrets.local.yaml. This file documents what secrets the platform needs.

# ──────────────────────────────────────────────────────────────────────
# LLM PROVIDERS
# ──────────────────────────────────────────────────────────────────────

llm:
  bedrock:
    # Two ways to authenticate; pick one.
    # Option 1 (preferred): use IAM role / instance profile / SSO. Leave keys empty.
    # Option 2: explicit access keys.
    aws_access_key_id: ""
    aws_secret_access_key: ""
    aws_session_token: ""        # optional, for temporary credentials

  anthropic:
    api_key: ""                  # sk-ant-...

  alibaba:
    api_key: ""                  # DashScope API key (sk-...)

# ──────────────────────────────────────────────────────────────────────
# DATABASES
# ──────────────────────────────────────────────────────────────────────

databases:
  app_db:
    url: ""                      # postgresql+asyncpg://user:pass@host:5432/app
  warehouse_db:
    url: ""                      # postgresql+asyncpg://user:pass@host:5432/warehouse
  redis:
    url: ""                      # redis://host:6379

# ──────────────────────────────────────────────────────────────────────
# CUBE
# ──────────────────────────────────────────────────────────────────────

cube:
  api_secret: ""                 # CUBEJS_API_SECRET (HS256 signing key)

# ──────────────────────────────────────────────────────────────────────
# AUTH
# ──────────────────────────────────────────────────────────────────────

auth:
  # Used to sign internal service-to-service JWTs.
  jwt_signing_key: ""
  oidc:
    okta:
      client_id: ""
      client_secret: ""
      issuer: ""                 # https://yourcompany.okta.com/oauth2/default
    google:
      client_id: ""
      client_secret: ""
    azure_ad:
      client_id: ""
      client_secret: ""
      tenant_id: ""

# ──────────────────────────────────────────────────────────────────────
# THIRD-PARTY
# ──────────────────────────────────────────────────────────────────────

third_party:
  sentry_dsn: ""
  stripe_api_key: ""             # Phase 4

# Lumen — local dev stack.
#
# Default `docker compose up` starts only the Lumen Python services + frontend.
# These run against SQLite (app DB) and the local DuckDB lending fixture
# mounted from local_test/data — no external infra required.
#
# Optional infra (postgres, cube, redis, temporal, localstack) is opt-in:
#   docker compose --profile infra up -d
# Use it when you want to exercise the Postgres / Cube path instead of
# the local SQLite + DuckDB defaults.

x-backend-base: &backend-base
  image: lumen-backend:local
  build:
    context: .
    dockerfile: backend/Dockerfile
  environment: &backend-env
    JWT_SIGNING_KEY: local-dev-only
    LUMEN_QUERY_BACKEND: duckdb_lending
    LUMEN_DEFAULT_VERTICAL: lending
    PYTHONPATH: /app/backend
  volumes:
    - ./backend:/app/backend
    - ./config:/app/config
    - ./local_test:/app/local_test

services:
  # ── Lumen Python services ──────────────────────────────────────────────
  workspace:
    <<: *backend-base
    command: ["python", "-m", "uvicorn", "services.workspace_service.main:app",
              "--host", "0.0.0.0", "--port", "8004",
              "--reload", "--reload-dir", "/app/backend",
              "--log-level", "warning"]
    ports:
      - "8004:8004"

  query:
    <<: *backend-base
    command: ["python", "-m", "uvicorn", "services.query_service.main:app",
              "--host", "0.0.0.0", "--port", "8002",
              "--reload", "--reload-dir", "/app/backend",
              "--log-level", "warning"]
    environment:
      <<: *backend-env
      WORKSPACE_SERVICE_URL: http://workspace:8004
    ports:
      - "8002:8002"
    depends_on:
      - workspace

  ai:
    <<: *backend-base
    command: ["python", "-m", "uvicorn", "services.ai_service.main:app",
              "--host", "0.0.0.0", "--port", "8001",
              "--reload", "--reload-dir", "/app/backend",
              "--log-level", "warning"]
    environment:
      <<: *backend-env
      USE_MOCK_LLM: ${USE_MOCK_LLM:-true}
      WORKSPACE_SERVICE_URL: http://workspace:8004
      QUERY_SERVICE_URL: http://query:8002
    ports:
      - "8001:8001"
    depends_on:
      - workspace
      - query

  gateway:
    <<: *backend-base
    command: ["python", "-m", "uvicorn", "services.api_gateway.main:app",
              "--host", "0.0.0.0", "--port", "8088",
              "--reload", "--reload-dir", "/app/backend",
              "--log-level", "warning"]
    environment:
      <<: *backend-env
      AI_SERVICE_URL: http://ai:8001
      QUERY_SERVICE_URL: http://query:8002
      WORKSPACE_SERVICE_URL: http://workspace:8004
    ports:
      - "8088:8088"
    depends_on:
      - workspace
      - ai
      - query

  # ── Frontend (Vite dev server) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_PROXY_TARGET: http://gateway:8088
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - gateway

  # ── Optional infra (opt-in via --profile infra) ────────────────────────
  postgres:
    profiles: ["infra"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lumen
      POSTGRES_PASSWORD: lumen
      POSTGRES_MULTIPLE_DATABASES: app,warehouse
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro

  redis:
    profiles: ["infra"]
    image: redis:7-alpine
    ports:
      - "6379:6379"

  cube:
    profiles: ["infra"]
    image: cubejs/cube:latest
    ports:
      - "4000:4000"
    environment:
      CUBEJS_DEV_MODE: "true"
      CUBEJS_DB_TYPE: postgres
      CUBEJS_DB_HOST: postgres
      CUBEJS_DB_NAME: warehouse
      CUBEJS_DB_USER: lumen
      CUBEJS_DB_PASS: lumen
      CUBEJS_API_SECRET: local-dev-secret-change-me
      CUBEJS_SCHEMA_PATH: schema
    volumes:
      - ./backend/cube/schema:/cube/conf/schema
      - ./backend/cube/cube.js:/cube/conf/cube.js
    depends_on:
      - postgres

  temporal:
    profiles: ["infra"]
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: lumen
      POSTGRES_PWD: lumen
      POSTGRES_SEEDS: postgres
    depends_on:
      - postgres

  localstack:
    profiles: ["infra"]
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,secretsmanager
      DEBUG: 0

volumes:
  pg_data:
  frontend_node_modules:

# Golden set for AI quality regression — lending vertical (default).
#
# Each entry is both a few-shot example AND an eval case.
# Tested against:
#   - Mock LLM (rules-based; sanity check the loop)
#   - Real Bedrock / Anthropic / Alibaba (the production target)
#
# Quality gate: regression must be ≤ 1 case worse than baseline. Failing cases
# get triaged via the failed-query-review queue, fixed by adjusting the Cube
# schema's description / synonyms / ai_hint, then promoted back to baseline.

examples:
  # ── Magnitude (single value) ──────────────────────────────────────────────

  - id: total_originated_all_time
    question: "What's our total origination volume?"
    cube_query:
      measures: [Loan.total_originated]
    expected:
      measures_used: [Loan.total_originated]
      expected_shape: big_number

  - id: total_loans_count
    question: "How many loans have we originated?"
    cube_query:
      measures: [Loan.count]
    expected:
      measures_used: [Loan.count]
      expected_shape: big_number

  - id: total_customers
    question: "How many customers do we have?"
    cube_query:
      measures: [Customer.count]
    expected:
      measures_used: [Customer.count]
      expected_shape: big_number

  - id: default_rate_overall
    question: "What is our overall default rate?"
    cube_query:
      measures: [Loan.default_rate]
    expected:
      measures_used: [Loan.default_rate]
      expected_shape: big_number

  - id: approval_rate_overall
    question: "What's our approval rate?"
    cube_query:
      measures: [Application.approval_rate]
    expected:
      measures_used: [Application.approval_rate]
      expected_shape: big_number

  # ── Comparison: 1 measure × 1 dimension ──────────────────────────────────

  - id: originated_by_grade
    question: "Origination volume by grade"
    cube_query:
      measures: [Loan.total_originated]
      dimensions: [Loan.grade]
    expected:
      measures_used: [Loan.total_originated]
      dimensions_used: [Loan.grade]
      expected_shape: bar

  - id: default_rate_by_grade
    question: "Default rate by grade"
    cube_query:
      measures: [Loan.default_rate]
      dimensions: [Loan.grade]
    expected:
      measures_used: [Loan.default_rate]
      dimensions_used: [Loan.grade]
      expected_shape: bar

  - id: count_by_purpose
    question: "Loan count by purpose"
    cube_query:
      measures: [Loan.count]
      dimensions: [Loan.purpose]
    expected:
      measures_used: [Loan.count]
      dimensions_used: [Loan.purpose]
      expected_shape: bar

  - id: customers_by_state
    question: "Customer count by state"
    cube_query:
      measures: [Customer.count]
      dimensions: [Customer.state]
    expected:
      measures_used: [Customer.count]
      dimensions_used: [Customer.state]
      expected_shape: bar

  - id: customers_by_credit_tier
    question: "How many customers in each credit tier?"
    cube_query:
      measures: [Customer.count]
      dimensions: [Customer.credit_tier]
    expected:
      measures_used: [Customer.count]
      dimensions_used: [Customer.credit_tier]
      expected_shape: bar

  - id: top_5_branches_by_volume
    question: "Top 5 branches by origination volume"
    cube_query:
      measures: [Loan.total_originated]
      dimensions: [Branch.name]
      order: {Loan.total_originated: desc}
      limit: 5
    expected:
      measures_used: [Loan.total_originated]
      dimensions_used: [Branch.name]
      expected_shape: bar

  - id: avg_fico_by_state
    question: "Average FICO score by state"
    cube_query:
      measures: [Customer.avg_fico]
      dimensions: [Customer.state]
    expected:
      measures_used: [Customer.avg_fico]
      dimensions_used: [Customer.state]
      expected_shape: bar

  - id: approval_rate_by_product
    question: "Approval rate by product type"
    cube_query:
      measures: [Application.approval_rate]
      dimensions: [Application.product_type]
    expected:
      measures_used: [Application.approval_rate]
      dimensions_used: [Application.product_type]
      expected_shape: bar

  - id: decline_reasons
    question: "Decline reasons by count"
    cube_query:
      measures: [Application.declined_count]
      dimensions: [Application.decline_reason]
      order: {Application.declined_count: desc}
    expected:
      measures_used: [Application.declined_count]
      dimensions_used: [Application.decline_reason]
      expected_shape: bar

  # ── Time series ──────────────────────────────────────────────────────────

  - id: originations_by_month
    question: "Loan originations by month for the last 12 months"
    cube_query:
      measures: [Loan.count]
      timeDimensions:
        - dimension: Loan.origination_date
          granularity: month
          dateRange: "last 12 months"
    expected:
      measures_used: [Loan.count]
      expected_shape: line

  - id: origination_volume_trend
    question: "Origination volume trend over the last year"
    cube_query:
      measures: [Loan.total_originated]
      timeDimensions:
        - dimension: Loan.origination_date
          granularity: month
          dateRange: "last year"
    expected:
      measures_used: [Loan.total_originated]
      expected_shape: line

  - id: originations_by_grade_over_time
    question: "Loan count by grade over time, monthly"
    cube_query:
      measures: [Loan.count]
      dimensions: [Loan.grade]
      timeDimensions:
        - dimension: Loan.origination_date
          granularity: month
    expected:
      measures_used: [Loan.count]
      dimensions_used: [Loan.grade]

  - id: default_rate_trend
    question: "Default rate trend by month this year"
    cube_query:
      measures: [Loan.default_rate]
      timeDimensions:
        - dimension: Loan.origination_date
          dateRange: "this year"
          granularity: month
    expected:
      measures_used: [Loan.default_rate]
      expected_shape: line

  - id: payments_by_month
    question: "Total payments collected by month last year"
    cube_query:
      measures: [Payment.total_received]
      timeDimensions:
        - dimension: Payment.scheduled_date
          dateRange: "last year"
          granularity: month
    expected:
      measures_used: [Payment.total_received]
      expected_shape: line

  - id: applications_by_channel_quarter
    question: "Application volume by channel by quarter"
    cube_query:
      measures: [Application.count]
      dimensions: [Application.channel]
      timeDimensions:
        - dimension: Application.application_date
          granularity: quarter
    expected:
      measures_used: [Application.count]
      dimensions_used: [Application.channel]

  # Regression for IMPLEMENTATION_PLAN §0.5 bug B1+B2:
  # the AI must emit a `dateRange` for "last 3 months", AND the visualizer
  # must pick grouped-bar for the resulting 3-period × 5-region shape.
  - id: applications_by_region_last_3_months
    question: "number of applications by region over last 3 months over time"
    cube_query:
      measures: [Application.count]
      dimensions: [Branch.region]
      timeDimensions:
        - dimension: Application.application_date
          dateRange: "last 3 months"
          granularity: month
    expected:
      measures_used: [Application.count]
      dimensions_used: [Branch.region]
      requires_date_range: true
      expected_shape: grouped_bar

  # ── Segments / filters ───────────────────────────────────────────────────

  - id: subprime_default_rate
    question: "Default rate among sub-prime loans"
    cube_query:
      measures: [Loan.default_rate]
      segments: [Loan.subprime_grade]
    expected:
      measures_used: [Loan.default_rate]
      segments_used: [Loan.subprime_grade]
      expected_shape: big_number

  - id: prime_total_originated
    question: "How much have we originated to prime customers this year?"
    cube_query:
      measures: [Loan.total_originated]
      segments: [Loan.prime_grade]
      timeDimensions:
        - dimension: Loan.origination_date
          dateRange: "this year"
    expected:
      measures_used: [Loan.total_originated]
      segments_used: [Loan.prime_grade]
      expected_shape: big_number

  - id: high_value_applications_count
    question: "How many applications are for $25k+?"
    cube_query:
      measures: [Application.count]
      segments: [Application.high_value]
    expected:
      measures_used: [Application.count]
      segments_used: [Application.high_value]
      expected_shape: big_number

  # ── Two-dim breakdowns ──────────────────────────────────────────────────

  - id: default_rate_by_grade_purpose
    question: "Default rate by grade and purpose"
    cube_query:
      measures: [Loan.default_rate]
      dimensions: [Loan.grade, Loan.purpose]
    expected:
      measures_used: [Loan.default_rate]
      dimensions_used: [Loan.grade, Loan.purpose]
      expected_shape: heatmap

  - id: originated_by_branch_region_product
    question: "Origination volume by region and product type"
    cube_query:
      measures: [Loan.total_originated]
      dimensions: [Branch.region, Loan.product_type]
    expected:
      measures_used: [Loan.total_originated]
      dimensions_used: [Branch.region, Loan.product_type]

  # ── Servicing / payment ──────────────────────────────────────────────────

  - id: late_payment_rate_by_method
    question: "Late payment rate by payment method"
    cube_query:
      measures: [Payment.late_payment_rate]
      dimensions: [Payment.payment_method]
    expected:
      measures_used: [Payment.late_payment_rate]
      dimensions_used: [Payment.payment_method]
      expected_shape: bar

  - id: total_interest_collected
    question: "Total interest income collected"
    cube_query:
      measures: [Payment.total_interest]
    expected:
      measures_used: [Payment.total_interest]
      expected_shape: big_number

  # ── Recovery ─────────────────────────────────────────────────────────────

  - id: recovery_rate_by_channel
    question: "Recovery rate by collection channel"
    cube_query:
      measures: [Collection.recovery_rate]
      dimensions: [Collection.channel]
    expected:
      measures_used: [Collection.recovery_rate]
      dimensions_used: [Collection.channel]
      expected_shape: bar

  - id: total_recovered_this_year
    question: "Total amount recovered this year"
    cube_query:
      measures: [Collection.total_recovered]
      timeDimensions:
        - dimension: Collection.opened_date
          dateRange: "this year"
    expected:
      measures_used: [Collection.total_recovered]
      expected_shape: big_number

cubes:
  - name: Customer
    sql_table: main.customer
    description: |
      Customers placing orders, tagged by nation and market segment.
      The basic unit for customer-cohort and segmentation analysis.
    meta:
      ai_facing: true
      vertical: tpch
      domain: customer

    joins:
      - name: Nation
        sql: "{CUBE}.c_nationkey = {Nation}.n_nationkey"
        relationship: many_to_one

    dimensions:
      - name: key
        sql: c_custkey
        type: number
        primary_key: true
      - name: name
        sql: c_name
        type: string
      - name: market_segment
        sql: c_mktsegment
        type: string
        description: "Customer's primary buying behavior category"
        meta:
          enum_values: [AUTOMOBILE, BUILDING, FURNITURE, MACHINERY, HOUSEHOLD]
          synonyms: [segment, market segment, customer segment, mkt segment]
          ai_hint: "When users say 'segment' they usually mean this field"
      - name: account_balance
        sql: c_acctbal
        type: number
        description: "Customer's account balance (USD). Can be negative."
        meta:
          format: currency

    measures:
      - name: count
        sql: c_custkey
        type: count_distinct
        description: "Number of unique customers"
        meta:
          synonyms: [customers, num_customers, customer_count]
          example_questions:
            - "How many customers do we have?"
            - "Customer count by region"
      - name: avg_account_balance
        sql: c_acctbal
        type: avg
        format: currency
        description: "Average customer account balance (USD)"
        meta:
          synonyms: [avg balance, average balance, mean acctbal]
      - name: total_account_balance
        sql: c_acctbal
        type: sum
        format: currency
        description: "Sum of all customer account balances (USD)"
      - name: positive_balance_count
        sql: c_custkey
        type: count_distinct
        filters:
          - sql: "{CUBE}.c_acctbal > 0"
        description: "Customers with a positive (credit) account balance"
      - name: negative_balance_count
        sql: c_custkey
        type: count_distinct
        filters:
          - sql: "{CUBE}.c_acctbal < 0"
        description: "Customers with a negative (debit) account balance"

    segments:
      - name: in_debt
        sql: "{CUBE}.c_acctbal < 0"
        description: "Customers carrying a negative balance"
      - name: high_balance
        sql: "{CUBE}.c_acctbal > 5000"
        description: "Customers with a balance over $5,000"

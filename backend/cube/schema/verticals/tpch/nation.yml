cubes:
  - name: Nation
    sql_table: main.nation
    description: |
      Countries (25 of them) grouped under regions.
      Used to roll up customer and supplier geography.
    meta:
      ai_facing: true
      vertical: tpch
      domain: geography

    joins:
      - name: Region
        sql: "{CUBE}.n_regionkey = {Region}.r_regionkey"
        relationship: many_to_one

    dimensions:
      - name: key
        sql: n_nationkey
        type: number
        primary_key: true
      - name: name
        sql: n_name
        type: string
        description: "Nation name (e.g. UNITED STATES, GERMANY, JAPAN)"
        meta:
          synonyms: [country, nation]

    measures:
      - name: count
        sql: n_nationkey
        type: count_distinct
        description: "Number of nations"

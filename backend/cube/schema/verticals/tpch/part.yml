cubes:
  - name: Part
    sql_table: main.part
    description: |
      Catalog of parts/products. Used for product-mix and brand analysis.
    meta:
      ai_facing: true
      vertical: tpch
      domain: catalog

    dimensions:
      - name: key
        sql: p_partkey
        type: number
        primary_key: true
      - name: name
        sql: p_name
        type: string
      - name: brand
        sql: p_brand
        type: string
        description: "Brand identifier (Brand#NN)"
      - name: type
        sql: p_type
        type: string
        description: "Part type description (multi-word, e.g. 'PROMO POLISHED COPPER')"
      - name: size
        sql: p_size
        type: number
      - name: container
        sql: p_container
        type: string
      - name: retail_price
        sql: p_retailprice
        type: number

    measures:
      - name: count
        sql: p_partkey
        type: count_distinct
        description: "Number of unique parts"
        meta:
          synonyms: [products, parts, sku count, num_parts]
      - name: avg_retail_price
        sql: p_retailprice
        type: avg
        format: currency

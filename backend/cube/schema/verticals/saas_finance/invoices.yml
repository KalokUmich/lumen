cubes:
  - name: Invoices
    sql_table: main.invoices
    description: |
      Billing invoices issued to customers. Use for collected revenue,
      DSO (days sales outstanding), payment timing, and dunning analysis.
    meta:
      ai_facing: true
      vertical: saas_finance
      domain: billing

    joins:
      - name: Accounts
        sql: "{CUBE}.account_id = {Accounts}.id"
        relationship: many_to_one

    dimensions:
      - name: id
        sql: id
        type: string
        primary_key: true
      - name: issued_at
        sql: issued_at
        type: time
      - name: due_at
        sql: due_at
        type: time
      - name: paid_at
        sql: paid_at
        type: time
      - name: status
        sql: status
        type: string
        meta:
          enum_values: [pending, paid, overdue, written_off]
          ai_hint: "Filter to status='paid' for collected revenue"

    measures:
      - name: total_billed
        sql: amount_usd
        type: sum
        format: currency
        description: "Total invoice value (any status)"
        meta:
          synonyms: [billed amount, invoiced amount]

      - name: total_collected
        sql: amount_usd
        type: sum
        filters:
          - sql: "{CUBE}.status = 'paid'"
        format: currency
        description: "Revenue actually collected (paid invoices only)"
        meta:
          synonyms: [collected revenue, cash collected, paid amount]
          example_questions:
            - "How much did we collect this quarter?"
            - "Collection trend by month"

      - name: total_outstanding
        sql: amount_usd
        type: sum
        filters:
          - sql: "{CUBE}.status IN ('pending','overdue')"
        format: currency
        description: "Unpaid invoice amount"
        meta:
          synonyms: [accounts receivable, outstanding ar, ar balance]

      - name: overdue_count
        sql: id
        type: count_distinct
        filters:
          - sql: "{CUBE}.status = 'overdue'"
        description: "Number of overdue invoices"

      - name: collection_rate
        sql: |
          CASE WHEN COUNT(*) > 0
            THEN CAST(SUM(CASE WHEN {CUBE}.status = 'paid' THEN 1 ELSE 0 END) AS DOUBLE) / COUNT(*)
            ELSE 0
          END
        type: number
        format: percent
        description: "Fraction of invoices that have been paid"
        meta:
          synonyms: [collection percentage, payment rate]

    segments:
      - name: paid
        sql: "{CUBE}.status = 'paid'"
      - name: overdue
        sql: "{CUBE}.status = 'overdue'"
